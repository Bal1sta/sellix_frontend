# ============================================================================
# Sellix — единый сервер: фронт (статика Vite) + бэк (Django/gunicorn)
# ----------------------------------------------------------------------------
# Один домен → нет CORS. nginx отдаёт собранный фронт и проксирует /api, /media,
# /static и /django-admin на Django (gunicorn слушает 127.0.0.1:8000).
#
# Собрать фронт:   cd my-react-app && npm ci && npm run build  → my-react-app/dist
# Скопировать:     /var/www/sellix/dist   (см. root ниже)
# ============================================================================

upstream sellix_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name mysellix.ru www.mysellix.ru;

    # --- Лимиты загрузки (фото товаров) ---
    client_max_body_size 20M;

    # --- Собранный фронтенд (SPA) ---
    root /var/www/sellix/dist;
    index index.html;

    # Бэкенд: REST API
    location /api/ {
        proxy_pass         http://sellix_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Медиа-файлы (загруженные фото). Можно отдавать напрямую с диска —
    # см. альтернативу ниже. По умолчанию проксируем на Django.
    location /media/ {
        proxy_pass         http://sellix_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Альтернатива (быстрее): отдавать с диска напрямую —
        # alias /var/www/sellix/backend/media/;
    }

    # Статика Django (нужна для админки /django-admin)
    location /static/ {
        proxy_pass         http://sellix_backend;
        proxy_set_header   Host $host;
    }

    # Django admin (стандартная админка из бэка). На бэке смонтирована как /admin/,
    # но чтобы не конфликтовать с возможными маршрутами SPA, проксируем явный путь.
    # Если оставляете /admin/ на бэке — замените префикс ниже на /admin/.
    location /django-admin/ {
        proxy_pass         http://sellix_backend/admin/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback: любой другой путь отдаёт index.html (react-router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэш статики фронта
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

# ----------------------------------------------------------------------------
# HTTPS: после получения сертификата (например, certbot) добавьте server-блок
# на listen 443 ssl; и редирект с 80 на 443. Бэк уже готов к
# X-Forwarded-Proto (SECURE_PROXY_SSL_HEADER в settings.py).
# ----------------------------------------------------------------------------
